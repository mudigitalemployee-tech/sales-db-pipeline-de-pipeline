name: Incremental Pipeline (Every 10 Min)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'data/sales_source.db'

jobs:
  incremental-load:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install deps
        run: pip install pandas
      
      - name: Check for new data
        id: check
        continue-on-error: true
        run: |
          LAST_RUN=$(cat data/last_run.txt)
          NOW=$(date -u '+%Y-%m-%d %H:%M:%S')
          
          echo "Last run: $LAST_RUN"
          echo "Current time: $NOW"
          
          # Create Python script to check new records
          cat > /tmp/check_new.py << 'EOF'
import sqlite3
import sys

last_run = sys.argv[1]
conn = sqlite3.connect('data/sales_source.db')
cur = conn.cursor()
cur.execute('SELECT COUNT(*) FROM sales_transactions WHERE created_at > ?', (last_run,))
count = cur.fetchone()[0]
print(count)
conn.close()
EOF
          
          NEW_COUNT=$(python3 /tmp/check_new.py "$LAST_RUN")
          
          echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          echo "now=$NOW" >> $GITHUB_OUTPUT
          echo "last_run=$LAST_RUN" >> $GITHUB_OUTPUT
          
          echo "New records: $NEW_COUNT"
          
          if [ "$NEW_COUNT" -gt 0 ]; then
            echo "✅ Running pipeline"
            exit 0
          else
            echo "⏸️ No new data"
            exit 1
          fi
      
      - name: Run pipeline
        if: steps.check.outputs.new_count > 0
        run: |
          echo "🚀 Processing ${{ steps.check.outputs.new_count }} records"
          
          cd pipeline
          
          python3 stage1_understanding.py \
            --project_name sales_incr \
            --source ../data/sales_source.db \
            --table sales_transactions \
            --purpose "Incremental" \
            --start_date "${{ steps.check.outputs.last_run }}" \
            --end_date "${{ steps.check.outputs.now }}"
          
          python3 stage2_design.py --project_name sales_incr
          
          python3 stage3_build.py \
            --project_name sales_incr \
            --output_db ../data/sales_target.db \
            --output_table_silver sales_clean \
            --output_table_gold sales_analytics \
            --db_write_mode append \
            --dq_fail_action warn
      
      - name: Update timestamp
        if: steps.check.outputs.new_count > 0
        run: |
          echo "${{ steps.check.outputs.now }}" > data/last_run.txt
          
          git config user.name "Pipeline Bot"
          git config user.email "bot@pipeline"
          git add data/
          git commit -m "chore: +${{ steps.check.outputs.new_count }} records [skip ci]"
          git push
      
      - name: Report
        if: always()
        run: |
          if [ "${{ steps.check.outputs.new_count }}" -gt "0" ]; then
            echo "✅ ${{ steps.check.outputs.new_count }} records processed"
          else
            echo "⏸️ No new data"
          fi
