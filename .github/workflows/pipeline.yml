name: sales_db_pipeline DE Pipeline CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DQ_THRESHOLD: '0'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install flake8 autopep8 pandas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint pipeline code
        run: |
          flake8 pipeline/ --max-line-length=120 --exclude=__pycache__

  validate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Validate transformed data
        run: |
          python3 -c "
import pandas as pd, sys, os
threshold = int(os.environ.get('DQ_THRESHOLD', '0'))
path = 'data/transformed.csv'
if not os.path.exists(path):
    print('WARNING: transformed.csv not found - skipping validation')
    sys.exit(0)
df = pd.read_csv(path)
print(f'Rows: {len(df)} | Columns: {len(df.columns)}')

# Check for SCD Type 2 columns in Gold if present
gold_path = 'data/gold_aggregated.csv'
if os.path.exists(gold_path):
    gold = pd.read_csv(gold_path)
    scd2_cols = ['_valid_from', '_valid_to', '_is_current', '_change_hash']
    has_scd2 = all(col in gold.columns for col in scd2_cols)
    if has_scd2:
        current_count = gold['_is_current'].sum()
        print(f'SCD Type 2 validated: {current_count} current records')

print('Validation passed.')
sys.exit(0)
          "
        env:
          DQ_THRESHOLD: ${{ env.DQ_THRESHOLD }}
